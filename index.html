<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Toe-Toe 3D Boxing</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #fff;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h2>Toe-Toe 3D Boxing</h2>
    <p>Player 1: A/D move, W punch</p>
    <p>Player 2: J/L move, I punch</p>
  </div>

  <!-- Three.js CDN -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <script>
    // Basic setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lights
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222222, 0.7);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 5);
    scene.add(dirLight);

    // Ring (floor)
    const ringGeo = new THREE.BoxGeometry(16, 0.5, 10);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 0;
    scene.add(ring);

    // Ropes (simple boxes)
    function addRope(z, color) {
      const ropeGeo = new THREE.BoxGeometry(16, 0.1, 0.1);
      const ropeMat = new THREE.MeshStandardMaterial({ color });
      const rope = new THREE.Mesh(ropeGeo, ropeMat);
      rope.position.set(0, 2, z);
      scene.add(rope);
    }
    addRope(-5, 0xffffff);
    addRope(5, 0xffffff);

    // Fighters
    function createFighter(color) {
      const group = new THREE.Group();

      // Body
      const bodyGeo = new THREE.BoxGeometry(1.2, 3, 1);
      const bodyMat = new THREE.MeshStandardMaterial({ color });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 1.5;
      group.add(body);

      // Head
      const headGeo = new THREE.SphereGeometry(0.7, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: 0xffddaa });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 3.4;
      group.add(head);

      // Right arm (punching)
      const armGeo = new THREE.BoxGeometry(0.4, 1.6, 0.4);
      const armMat = new THREE.MeshStandardMaterial({ color });
      const arm = new THREE.Mesh(armGeo, armMat);
      arm.position.set(0.9, 2.2, 0.5);
      arm.rotation.z = Math.PI / 6;
      group.add(arm);

      // Glove
      const gloveGeo = new THREE.SphereGeometry(0.4, 16, 16);
      const gloveMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
      const glove = new THREE.Mesh(gloveGeo, gloveMat);
      glove.position.set(1.3, 1.7, 0.7);
      group.add(glove);

      group.userData = {
        body,
        arm,
        glove,
        punchTimer: 0,
        hp: 100
      };

      return group;
    }

    const fighter1 = createFighter(0x4caf50);
    fighter1.position.set(-4, 0, 0);
    scene.add(fighter1);

    const fighter2 = createFighter(0xf44336);
    fighter2.position.set(4, 0, 0);
    fighter2.rotation.y = Math.PI; // face left
    scene.add(fighter2);

    // Keyboard
    const keys = {};
    window.addEventListener("keydown", (e) => (keys[e.key] = true));
    window.addEventListener("keyup", (e) => (keys[e.key] = false));

    // Simple HP display in console (you can improve this)
    function logHP() {
      console.log("P1 HP:", fighter1.userData.hp, " | P2 HP:", fighter2.userData.hp);
    }

    function updateFighter(fighter, leftKey, rightKey, punchKey, dt) {
      const speed = 5;
      if (keys[leftKey]) {
        fighter.position.x -= speed * dt;
      }
      if (keys[rightKey]) {
        fighter.position.x += speed * dt;
      }

      // Clamp inside ring
      fighter.position.x = Math.max(-6, Math.min(6, fighter.position.x));

      // Punch
      const data = fighter.userData;
      if (keys[punchKey] && data.punchTimer <= 0) {
        data.punchTimer = 0.25; // seconds
      }

      // Animate punch
      if (data.punchTimer > 0) {
        data.punchTimer -= dt;
        const t = Math.max(data.punchTimer, 0);
        const punchAmount = Math.sin((0.25 - t) * Math.PI * 4) * 0.6;

        data.arm.rotation.x = -punchAmount;
        data.glove.position.z = 0.7 + punchAmount * 1.2;
      } else {
        data.arm.rotation.x = 0;
        data.glove.position.z = 0.7;
      }
    }

    function checkHit(attacker, defender) {
      const a = attacker.userData.glove;
      const d = defender.userData.body;

      const glovePos = new THREE.Vector3();
      a.getWorldPosition(glovePos);

      const bodyPos = new THREE.Vector3();
      d.getWorldPosition(bodyPos);

      const dist = glovePos.distanceTo(bodyPos);
      if (dist < 1.2) {
        defender.userData.hp -= 2;
        if (defender.userData.hp < 0) defender.userData.hp = 0;
        logHP();
      }
    }

    let lastTime = performance.now();

    function animate() {
      const now = performance.now();
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      updateFighter(fighter1, "a", "d", "w", dt);
      updateFighter(fighter2, "j", "l", "i", dt);

      // Check hits when punching
      if (fighter1.userData.punchTimer > 0.18) {
        checkHit(fighter1, fighter2);
      }
      if (fighter2.userData.punchTimer > 0.18) {
        checkHit(fighter2, fighter1);
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
